server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://159.112.142.234:5432/MathBot_db
    username: zylo_user
    password: una_password_segura
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
