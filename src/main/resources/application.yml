server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://159.112.142.234:5432/MathBot_db}
    username: ${SPRING_DATASOURCE_USERNAME:zylo_user}
    password: ${SPRING_DATASOURCE_PASSWORD:una_password_segura}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  groq:
    api-key: ${GROQ_API_KEY}
    base-url: ${GROQ_BASE_URL:https://api.groq.com/openai/v1}
    model: ${GROQ_MODEL:openai/gpt-oss-20b}
    temperature: ${GROQ_TEMPERATURE:0.4}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://math-bot-frontend.vercel.app/,http://localhost:5173,http://127.0.0.1:5173}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
